<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>스마트기기 점검 현황</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          sky2: '#e0f2fe',
          mint: '#d1fae5',
          mintDeep: '#10b981',
          pastelBlue: '#bae6fd',
          pastelYellow: '#fef3c7',
          pastelOrange: '#fed7aa',
        }
      }

</script>
<style>
  body { font-family: 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: linear-gradient(180deg,#f0f9ff 0%, #f8fafc 100%); min-height:100vh;}
  .chip { display:inline-flex; align-items:center; justify-content:center; padding:2px 8px; border-radius:9999px; font-size:12px; font-weight:600;}
  .toggle-o { background:#bbf7d0; color:#065f46;}
  .toggle-x { background:#fecaca; color:#991b1b;}
  .toggle-n { background:#e5e7eb; color:#6b7280;}
  .card-done { background:#dcfce7; }
  .progress-bar { transition: width .3s ease;}
  input[type="text"]:focus, select:focus { outline: 2px solid #7dd3fc; outline-offset:1px; }
  .modal-bg { background: rgba(15,23,42,.45); backdrop-filter: blur(2px);}
  table { border-collapse: separate; border-spacing: 0; }
  .sync-dot { width:8px; height:8px; border-radius:9999px; display:inline-block; }
</style>
</head>
<body class="text-slate-800">
<div id="app"></div>

<script>
/* ============================================================
   스마트기기 점검 현황 - Supabase 실시간 단일 HTML 앱
   ============================================================ */

// ---------- Supabase ----------
const SUPABASE_URL = 'https://znjhnmsyoedxaylzmwvq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HSwBopWAveCDX0LfaxePVQ_CBq7opKX';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

// ---------- 상수 ----------
const GRADES = [
  { grade: 1, classes: 11 },
  { grade: 2, classes: 12 },
  { grade: 3, classes: 12 },
];
const DEFAULT_TABLET_COUNT = 29;
const LOCATIONS = ['교실', '대기실'];
const CHECK_FIELDS = [
  { key: 'exist', label: '태블릿 유무' },
  { key: 'charge', label: '충전' },
  { key: 'touch', label: '터치' },
  { key: 'lcd', label: '액정' },
  { key: 'keyboard', label: '키보드' },
  { key: 'mdm', label: 'MDM정책' },
  { key: 'sw', label: 'SW업데이트' },
  { key: 'label', label: '라벨' },
];

const SS_AUTH = 'tabletCheck.auth';
const DEFAULT_PW = 'abcd1234';
const MASTER_PW = 'abcd2026!!';

// ---------- 데이터 계층 (Supabase + 메모리 캐시 + 실시간 구독) ----------
const DataStore = {
  _state: { tablets: [], chargers: {}, adminPw: DEFAULT_PW, ready: false, online: false },
  _listeners: [],
  subscribe(fn) { this._listeners.push(fn); },
  _notify() { this._listeners.forEach(fn => fn()); },
  getAll() { return this._state; },
  getTablets(grade, cls) {
    return this._state.tablets
      .filter(t => t.grade === grade && t.cls === cls)
      .sort((a,b) => a.num - b.num);
  },
  getCharger(grade, cls) {
    return this._state.chargers[`${grade}-${cls}`] || { dust: '-', label: '-' };
  },

  async init() {
    try {
      await this._refetch();
      const { data: pw } = await sb.from('app_settings').select('value').eq('key','admin_pw').maybeSingle();
      if (pw && pw.value) this._state.adminPw = pw.value;
      this._state.ready = true;
      this._state.online = true;
      this._notify();
      this._subscribeRealtime();
    } catch (err) {
      console.error('Supabase init 실패:', err);
      this._state.ready = true;
      this._state.online = false;
      this._notify();
    }
  },

  async _refetch() {
    const [tRes, cRes] = await Promise.all([
      sb.from('tablets').select('*'),
      sb.from('chargers').select('*'),
    ]);
    if (tRes.error) throw tRes.error;
    if (cRes.error) throw cRes.error;
    this._state.tablets = (tRes.data || []).map(rowToTablet);
    this._state.chargers = {};
    (cRes.data || []).forEach(c => {
      this._state.chargers[`${c.grade}-${c.cls}`] = { dust: c.dust, label: c.label };
    });
    this._notify();
  },

  _subscribeRealtime() {
    sb.channel('realtime:public')
      .on('postgres_changes', { event:'*', schema:'public', table:'tablets' }, payload => {
        if (payload.eventType === 'DELETE') {
          this._state.tablets = this._state.tablets.filter(t => t.id !== payload.old.id);
        } else {
          const t = rowToTablet(payload.new);
          const i = this._state.tablets.findIndex(x => x.id === t.id);
          if (i >= 0) this._state.tablets[i] = t; else this._state.tablets.push(t);
        }
        this._notify();
      })
      .on('postgres_changes', { event:'*', schema:'public', table:'chargers' }, payload => {
        if (payload.eventType === 'DELETE') {
          delete this._state.chargers[`${payload.old.grade}-${payload.old.cls}`];
        } else {
          const c = payload.new;
          this._state.chargers[`${c.grade}-${c.cls}`] = { dust: c.dust, label: c.label };
        }
        this._notify();
      })
      .on('postgres_changes', { event:'*', schema:'public', table:'app_settings' }, payload => {
        if (payload.new && payload.new.key === 'admin_pw') {
          this._state.adminPw = payload.new.value;
        }
      })
      .subscribe();
  },

  async upsertTablet(t) {
    // optimistic
    const i = this._state.tablets.findIndex(x => x.id === t.id);
    if (i >= 0) this._state.tablets[i] = t; else this._state.tablets.push(t);
    this._notify();
    const { error } = await sb.from('tablets').upsert(tabletToRow(t));
    if (error) { alert('저장 실패: ' + error.message); await this._refetch(); }
  },
  async deleteTablet(id) {
    this._state.tablets = this._state.tablets.filter(t => t.id !== id);
    this._notify();
    const { error } = await sb.from('tablets').delete().eq('id', id);
    if (error) { alert('삭제 실패: ' + error.message); await this._refetch(); }
  },
  async setCharger(grade, cls, data) {
    const k = `${grade}-${cls}`;
    this._state.chargers[k] = data;
    this._notify();
    const { error } = await sb.from('chargers').upsert({ grade, cls, dust: data.dust, label: data.label });
    if (error) { alert('저장 실패: ' + error.message); await this._refetch(); }
  },

  async bulkInit(overwrite = false) {
    if (overwrite) {
      const e1 = await sb.from('tablets').delete().not('id','is',null);
      const e2 = await sb.from('chargers').delete().gte('grade',0);
      if (e1.error || e2.error) { alert('초기화 실패'); return; }
      this._state.tablets = [];
      this._state.chargers = {};
    }
    const tabletRows = [];
    const chargerRows = [];
    GRADES.forEach(({ grade, classes }) => {
      for (let cls = 1; cls <= classes; cls++) {
        for (let n = 1; n <= DEFAULT_TABLET_COUNT; n++) {
          const id = makeId(grade, cls, n);
          if (!this._state.tablets.find(t => t.id === id)) {
            tabletRows.push(tabletToRow(makeBlankTablet(grade, cls, n)));
          }
        }
        const k = `${grade}-${cls}`;
        if (!this._state.chargers[k]) chargerRows.push({ grade, cls, dust: '-', label: '-' });
      }
    });
    if (tabletRows.length) {
      const { error } = await sb.from('tablets').upsert(tabletRows);
      if (error) { alert('태블릿 생성 실패: ' + error.message); return; }
    }
    if (chargerRows.length) {
      const { error } = await sb.from('chargers').upsert(chargerRows);
      if (error) { alert('충전함 생성 실패: ' + error.message); return; }
    }
    await this._refetch();
  },

  async classInit(grade, cls) {
    const tabletRows = [];
    for (let n = 1; n <= DEFAULT_TABLET_COUNT; n++) {
      const t = makeBlankTablet(grade, cls, n);
      CHECK_FIELDS.forEach(f => t.checks[f.key] = 'O');
      t.done = true;
      t.location = '교실';
      tabletRows.push(tabletToRow(t));
    }
    const e1 = await sb.from('tablets').upsert(tabletRows);
    const e2 = await sb.from('chargers').upsert({ grade, cls, dust: 'O', label: 'O' });
    if (e1.error || e2.error) { alert('반별 초기 데이터 생성 실패'); return; }
    await this._refetch();
  },

  async classReset(grade, cls) {
    const e1 = await sb.from('tablets').delete().eq('grade', grade).eq('cls', cls);
    const e2 = await sb.from('chargers').delete().eq('grade', grade).eq('cls', cls);
    if (e1.error || e2.error) { alert('반별 초기화 실패'); return; }
    await this._refetch();
  },

  async setAdminPw(newPw) {
    this._state.adminPw = newPw;
    const { error } = await sb.from('app_settings').upsert({ key: 'admin_pw', value: newPw });
    if (error) throw error;
  }
};

function makeId(grade, cls, num) {
  return `${grade}${String(cls).padStart(2,'0')}${String(num).padStart(2,'0')}`;
}
function rowToTablet(r) {
  return {
    id: r.id, grade: r.grade, cls: r.cls, num: r.num,
    location: r.location || '교실',
    checks: r.checks || {},
    done: !!r.done,
    note: r.note || ''
  };
}
function tabletToRow(t) {
  return {
    id: t.id, grade: t.grade, cls: t.cls, num: t.num,
    location: t.location, checks: t.checks, done: t.done, note: t.note || ''
  };
}
function makeBlankTablet(grade, cls, num) {
  const checks = {};
  CHECK_FIELDS.forEach(f => checks[f.key] = '-');
  return { id: makeId(grade, cls, num), grade, cls, num, location: '교실', checks, done: false, note: '' };
}

// ---------- 인증 ----------
const Auth = {
  isAdmin() { return sessionStorage.getItem(SS_AUTH) === '1'; },
  login(pw) {
    const stored = DataStore._state.adminPw || DEFAULT_PW;
    if (pw === MASTER_PW || pw === stored) {
      sessionStorage.setItem(SS_AUTH, '1');
      return true;
    }
    return false;
  },
  logout() { sessionStorage.removeItem(SS_AUTH); },
  async changePw(curr, next) {
    const stored = DataStore._state.adminPw || DEFAULT_PW;
    if (curr !== stored && curr !== MASTER_PW) return { ok:false, msg:'현재 비밀번호가 일치하지 않습니다.' };
    if (!next || next.length < 4) return { ok:false, msg:'새 비밀번호는 4자 이상이어야 합니다.' };
    if (next === MASTER_PW) return { ok:false, msg:'사용할 수 없는 비밀번호입니다.' };
    try { await DataStore.setAdminPw(next); return { ok:true }; }
    catch (e) { return { ok:false, msg:'저장 실패: ' + e.message }; }
  }
};

// 쓰기 보호 가드
function requireAdmin() {
  if (!Auth.isAdmin()) { alert('관리자 인증이 필요합니다.'); UI.showLogin = true; render(); return false; }
  return true;
}

// ---------- UI 상태 ----------
const UI = {
  view: 'main',
  grade: 1,
  cls: 1,
  showLogin: false,
  showPwChange: false,
  loginError: '',
  pwChangeMsg: '',
};

// ---------- 렌더 ----------
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <main class="max-w-6xl mx-auto px-4 pb-16">
      ${!DataStore._state.ready
        ? `<div class="mt-10 text-center text-slate-500 text-sm">데이터 불러오는 중…</div>`
        : (UI.view === 'main' ? renderMainView() : renderAdminView())}
    </main>
    ${UI.showLogin ? renderLoginModal() : ''}
    ${UI.showPwChange ? renderPwChangeModal() : ''}
    <footer class="text-center text-xs text-slate-400 pb-6">© 스마트기기 점검 시스템 · 실시간 동기화</footer>
  `;
  bindEvents();
}

function renderHeader() {
  const admin = Auth.isAdmin();
  const online = DataStore._state.online;
  return `
  <header class="sticky top-0 z-20 bg-white/80 backdrop-blur border-b border-sky-100">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-300 to-emerald-300 grid place-items-center text-white font-bold shrink-0">📱</div>
        <h1 class="text-base sm:text-lg font-bold truncate">스마트기기 점검 현황</h1>
        <span class="hidden sm:inline-flex items-center gap-1 ml-2 text-[11px] text-slate-500">
          <span class="sync-dot ${online?'bg-emerald-400':'bg-rose-400'}"></span>${online?'실시간 연결':'오프라인'}
        </span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button data-act="view-main" class="px-3 py-1.5 rounded-lg text-sm ${UI.view==='main'?'bg-sky-500 text-white':'bg-white border border-sky-200 text-sky-700'}">조회</button>
        <button data-act="view-admin" class="px-3 py-1.5 rounded-lg text-sm ${UI.view==='admin'?'bg-emerald-500 text-white':'bg-white border border-emerald-200 text-emerald-700'}">관리</button>
        ${admin
          ? `<button data-act="logout" class="px-3 py-1.5 rounded-lg text-sm bg-rose-100 text-rose-700 border border-rose-200">로그아웃</button>`
          : `<button data-act="login" class="px-3 py-1.5 rounded-lg text-sm bg-slate-100 text-slate-700 border border-slate-200">관리자 인증</button>`}
      </div>
    </div>
  </header>`;
}

function renderClassSelector(includeAll = false) {
  const gradeInfo = GRADES.find(g => g.grade === UI.grade);
  const classOptions = Array.from({length: gradeInfo.classes}, (_,i)=>i+1);
  return `
  <div class="flex flex-wrap items-center gap-2">
    <select data-act="grade" class="px-3 py-2 rounded-lg bg-white border border-sky-200 text-sm">
      ${GRADES.map(g=>`<option value="${g.grade}" ${g.grade===UI.grade?'selected':''}>${g.grade}학년</option>`).join('')}
    </select>
    <select data-act="cls" class="px-3 py-2 rounded-lg bg-white border border-sky-200 text-sm">
      ${includeAll ? `<option value="0" ${UI.cls===0?'selected':''}>전체(학년)</option>` : ''}
      ${classOptions.map(c=>`<option value="${c}" ${c===UI.cls?'selected':''}>${c}반</option>`).join('')}
    </select>
  </div>`;
}

// 학년 전체 조회
function renderGradeOverview() {
  const gradeInfo = GRADES.find(g => g.grade === UI.grade);
  const classes = Array.from({length: gradeInfo.classes}, (_,i)=>i+1);
  const rows = classes.map(cls => {
    const tablets = DataStore.getTablets(UI.grade, cls).filter(t => t.location === '교실');
    const total = tablets.length;
    const done = tablets.filter(t => t.done).length;
    const pct = total ? Math.round(done/total*100) : 0;
    return { cls, total, done, pct, complete: total>0 && done===total };
  });
  const totalSum = rows.reduce((a,r)=>a+r.total,0);
  const doneSum = rows.reduce((a,r)=>a+r.done,0);
  const overallPct = totalSum ? Math.round(doneSum/totalSum*100) : 0;
  const completeCount = rows.filter(r=>r.complete).length;

  return `
  <section class="mt-5 space-y-5">
    <div class="bg-white rounded-2xl border border-sky-100 shadow-sm p-4 sm:p-5">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <div class="text-xs text-slate-500">반 선택</div>
          <div class="mt-1">${renderClassSelector(true)}</div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">${UI.grade}학년 전체 완료</div>
          <div class="mt-1 font-bold text-lg">${completeCount} / ${rows.length} 반 완료</div>
        </div>
      </div>
      <div class="mt-4">
        <div class="flex justify-between text-sm font-medium text-slate-700">
          <span>전체 완료 ${doneSum} / ${totalSum} 대</span>
          <span>${overallPct}%</span>
        </div>
        <div class="mt-2 h-3 bg-slate-100 rounded-full overflow-hidden">
          <div class="progress-bar h-full ${overallPct===100?'bg-emerald-400':overallPct>0?'bg-amber-400':'bg-orange-400'}" style="width:${overallPct}%"></div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-sky-100 shadow-sm p-4 sm:p-5">
      <h2 class="font-bold mb-3">${UI.grade}학년 반별 진행 현황</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${rows.map(r => {
          const badge = r.total===0
            ? '<span class="chip bg-slate-200 text-slate-600">데이터 없음</span>'
            : r.complete
              ? '<span class="chip bg-emerald-200 text-emerald-800">완료</span>'
              : r.done>0
                ? '<span class="chip bg-amber-200 text-amber-800">진행 중</span>'
                : '<span class="chip bg-orange-200 text-orange-800">미완료</span>';
          const barColor = r.pct===100?'bg-emerald-400':r.pct>0?'bg-amber-400':'bg-orange-400';
          return `
          <button data-act="goto-cls" data-cls="${r.cls}" class="text-left rounded-xl border ${r.complete?'border-emerald-200 bg-emerald-50/50':'border-slate-200 bg-white'} p-3 hover:shadow-sm transition">
            <div class="flex items-center justify-between">
              <div class="font-bold text-slate-700">${UI.grade}학년 ${r.cls}반</div>
              ${badge}
            </div>
            <div class="mt-2 flex justify-between text-xs text-slate-600">
              <span>완료 ${r.done} / 전체 ${r.total}</span>
              <span class="font-medium">${r.pct}%</span>
            </div>
            <div class="mt-1 h-2 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full ${barColor}" style="width:${r.pct}%"></div>
            </div>
          </button>`;
        }).join('')}
      </div>
      <div class="mt-3 text-xs text-slate-400">반 카드를 클릭하면 해당 반 상세 화면으로 이동합니다. (위치: 교실 기준)</div>
    </div>
  </section>`;
}

// ---------- 메인 (조회) ----------
function renderMainView() {
  if (UI.cls === 0) return renderGradeOverview();
  const allTablets = DataStore.getTablets(UI.grade, UI.cls);
  const tablets = allTablets.filter(t => t.location === '교실');
  const total = tablets.length;
  const done = tablets.filter(t => t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const status = total === 0 ? 'empty' : done === total ? 'green' : done > 0 ? 'yellow' : 'orange';
  const statusBadge = {
    empty: '<span class="chip bg-slate-200 text-slate-600">데이터 없음</span>',
    green: '<span class="chip bg-emerald-200 text-emerald-800">완료</span>',
    yellow:'<span class="chip bg-amber-200 text-amber-800">진행 중</span>',
    orange:'<span class="chip bg-orange-200 text-orange-800">미진행</span>',
  }[status];
  const charger = DataStore.getCharger(UI.grade, UI.cls);

  return `
  <section class="mt-5 space-y-5">
    <div class="bg-white rounded-2xl border border-sky-100 shadow-sm p-4 sm:p-5">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <div class="text-xs text-slate-500">반 선택</div>
          <div class="mt-1">${renderClassSelector(true)}</div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">진행 상태 <span class="text-[10px] text-slate-400">(위치: 교실 기준)</span></div>
          <div class="mt-1">${statusBadge}</div>
        </div>
      </div>
      <div class="mt-4">
        <div class="flex justify-between text-sm font-medium text-slate-700">
          <span>완료 ${done} / 전체 ${total}</span>
          <span>${pct}%</span>
        </div>
        <div class="mt-2 h-3 bg-slate-100 rounded-full overflow-hidden">
          <div class="progress-bar h-full ${pct===100?'bg-emerald-400':pct>0?'bg-amber-400':'bg-orange-400'}" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="mt-4 grid grid-cols-2 gap-3 sm:max-w-md">
        <div class="rounded-xl bg-sky-50 border border-sky-100 p-3">
          <div class="text-xs text-slate-500">충전함 - 먼지제거</div>
          <div class="mt-1 font-bold text-lg">${charger.dust}</div>
        </div>
        <div class="rounded-xl bg-emerald-50 border border-emerald-100 p-3">
          <div class="text-xs text-slate-500">충전함 - 라벨</div>
          <div class="mt-1 font-bold text-lg">${charger.label}</div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-sky-100 shadow-sm p-4 sm:p-5">
      <h2 class="font-bold mb-3">태블릿 현황 <span class="text-xs font-normal text-slate-500">(위치: 교실)</span></h2>

}

function ox(name, value) {
  return `
  <div class="inline-flex rounded-lg overflow-hidden border border-slate-200 text-xs" data-ox="${name}">
    <button class="px-3 py-1.5 ${value==='O'?'toggle-o':'bg-white text-slate-500'}" data-ox-val="O">O</button>
    <button class="px-3 py-1.5 ${value==='X'?'toggle-x':'bg-white text-slate-500'}" data-ox-val="X">X</button>
    <button class="px-3 py-1.5 ${value==='-'||!value?'toggle-n':'bg-white text-slate-500'}" data-ox-val="-">-</button>
  </div>`;
}

// ---------- 이벤트 ----------
function bindEvents() {
  document.querySelectorAll('[data-act]').forEach(el => el.addEventListener('click', onAction));
  document.querySelectorAll('[data-ox]').forEach(group => {
    group.querySelectorAll('[data-ox-val]').forEach(btn => {
      btn.addEventListener('click', () => onOxClick(group.dataset.ox, btn.dataset.oxVal));
    });
  });
  document.querySelectorAll('[data-tablet-field]').forEach(el => {
    const handler = () => onTabletField(el);
    el.addEventListener('change', handler);
    if (el.tagName === 'INPUT' && el.type === 'text') el.addEventListener('blur', handler);
  });
  const g = document.querySelector('[data-act="grade"]');
  const c = document.querySelector('[data-act="cls"]');
  if (g) g.addEventListener('change', e => { UI.grade = parseInt(e.target.value); UI.cls = 1; render(); });
  if (c) c.addEventListener('change', e => { UI.cls = parseInt(e.target.value); render(); });
}

async function onAction(e) {
  const act = e.currentTarget.dataset.act;
  if (act === 'grade' || act === 'cls') return;
  if (act === 'view-main') { UI.view = 'main'; render(); }
  else if (act === 'view-admin') { if (UI.cls === 0) UI.cls = 1; UI.view = 'admin'; render(); }
  else if (act === 'goto-cls') { UI.cls = parseInt(e.currentTarget.dataset.cls); render(); }
  else if (act === 'login') { UI.showLogin = true; UI.loginError=''; render(); setTimeout(()=>document.getElementById('login-pw')?.focus(),50); }
  else if (act === 'close-login' || act === 'close-login-bg') { UI.showLogin=false; render(); }
  else if (act === 'do-login') {
    const pw = document.getElementById('login-pw').value;
    if (Auth.login(pw)) { UI.showLogin=false; UI.view='admin'; render(); }
    else { UI.loginError='비밀번호가 일치하지 않습니다.'; render(); }
  }
  else if (act === 'logout') { Auth.logout(); UI.view='main'; render(); }
  else if (act === 'change-pw') { UI.showPwChange=true; UI.pwChangeMsg=''; render(); }
  else if (act === 'close-pw' || act === 'close-pw-bg') { UI.showPwChange=false; render(); }
  else if (act === 'do-pw') {
    const curr = document.getElementById('pw-curr').value;
    const n1 = document.getElementById('pw-new').value;
    const n2 = document.getElementById('pw-new2').value;
    if (n1 !== n2) { UI.pwChangeMsg='새 비밀번호가 일치하지 않습니다.'; render(); return; }
    const r = await Auth.changePw(curr, n1);
    UI.pwChangeMsg = r.ok ? '✓ 비밀번호가 변경되었습니다.' : r.msg;
    render();
  }
  else if (act === 'bulk-init') {
    if (!requireAdmin()) return;
    if (confirm('1~3학년 모든 반의 기본 태블릿 데이터를 생성합니다. 기존 데이터는 유지됩니다.')) {
      await DataStore.bulkInit(false);
    }
  }
  else if (act === 'bulk-reset') {
    if (!requireAdmin()) return;
    if (confirm('⚠️ 모든 데이터를 삭제하고 새로 생성합니다. 계속하시겠습니까?')) {
      await DataStore.bulkInit(true);
    }
  }
  else if (act === 'class-init') {
    if (!requireAdmin()) return;
    if (confirm(`${UI.grade}학년 ${UI.cls}반의 초기 데이터를 생성합니다.\n(태블릿 ${DEFAULT_TABLET_COUNT}대, 모든 항목 "O" / 완료 체크)\n기존 반 데이터는 덮어쓰여집니다.`)) {
      await DataStore.classInit(UI.grade, UI.cls);
    }
  }
  else if (act === 'class-reset') {
    if (!requireAdmin()) return;
    if (confirm(`⚠️ ${UI.grade}학년 ${UI.cls}반의 모든 데이터를 삭제합니다. 계속하시겠습니까?`)) {
      await DataStore.classReset(UI.grade, UI.cls);
    }
  }
  else if (act === 'export-xlsx') {
    exportToExcel();
  }
  else if (act === 'add-tablet') {
    if (!requireAdmin()) return;
    const tablets = DataStore.getTablets(UI.grade, UI.cls);
    const maxNum = tablets.reduce((m,t)=>Math.max(m,t.num),0);
    const num = parseInt(prompt(`추가할 태블릿 번호를 입력하세요 (1~99)`, String(maxNum+1)));
    if (!num || num<1 || num>99) return;
    if (tablets.find(t=>t.num===num)) { alert('이미 존재하는 번호입니다.'); return; }
    await DataStore.upsertTablet(makeBlankTablet(UI.grade, UI.cls, num));
  }
  else if (act === 'del-tablet') {
    if (!requireAdmin()) return;
    const id = e.currentTarget.dataset.id;
    if (confirm(`${id} 태블릿을 삭제하시겠습니까?`)) { await DataStore.deleteTablet(id); }
  }
}

async function onOxClick(name, val) {
  if (!Auth.isAdmin()) { alert('관리자 인증이 필요합니다.'); return; }
  if (name === 'charger-dust') {
    const c = DataStore.getCharger(UI.grade, UI.cls);
    await DataStore.setCharger(UI.grade, UI.cls, { ...c, dust: val });
    return;
  }
  if (name === 'charger-label') {
    const c = DataStore.getCharger(UI.grade, UI.cls);
    await DataStore.setCharger(UI.grade, UI.cls, { ...c, label: val });
    return;
  }
  const parts = name.split('|');
  if (parts[0] === 'tablet') {
    const id = parts[1], field = parts[2];
    const t = DataStore.getAll().tablets.find(x=>x.id===id);
    if (!t) return;
    t.checks = { ...t.checks, [field]: val };
    await DataStore.upsertTablet(t);
  }
}

async function onTabletField(el) {
  if (!Auth.isAdmin()) { alert('관리자 인증이 필요합니다.'); return; }
  const [id, field] = el.dataset.tabletField.split('|');
  const t = DataStore.getAll().tablets.find(x=>x.id===id);
  if (!t) return;
  if (field === 'done') t.done = el.checked;
  else if (field === 'note') t.note = el.value;
  else if (field === 'location') t.location = el.value;
  await DataStore.upsertTablet(t);
}

function exportToExcel() {
  const all = DataStore.getAll();
  const tabletRows = all.tablets.slice()
    .sort((a,b) => a.grade-b.grade || a.cls-b.cls || a.num-b.num)
    .map(t => {
      const row = { 'ID':t.id, '학년':t.grade, '반':t.cls, '번호':t.num, '위치':t.location };
      CHECK_FIELDS.forEach(f => row[f.label] = t.checks[f.key] || '-');
      row['완료'] = t.done ? 'O' : '';
      row['비고'] = t.note || '';
      return row;
    });
  const chargerRows = [];
  GRADES.forEach(({grade, classes}) => {
    for (let cls=1; cls<=classes; cls++) {
      const c = DataStore.getCharger(grade, cls);
      chargerRows.push({ '학년':grade, '반':cls, '먼지제거':c.dust, '라벨':c.label });
    }
  });
  const summaryRows = [];
  GRADES.forEach(({grade, classes}) => {
    for (let cls=1; cls<=classes; cls++) {
      const tabs = all.tablets.filter(t => t.grade===grade && t.cls===cls && t.location==='교실');
      const total = tabs.length;
      const done = tabs.filter(t => t.done).length;
      summaryRows.push({ '학년':grade, '반':cls, '교실 전체':total, '완료':done, '진행률(%)':total ? Math.round(done/total*100) : 0 });
    }
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), '반별 진행률');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tabletRows), '태블릿');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(chargerRows), '충전함');
  const today = new Date();
  const fname = `스마트기기_점검현황_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---------- 부트 ----------
DataStore.subscribe(render);
render();
DataStore.init();
</script>
